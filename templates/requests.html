{% extends "base.html" %}
{% block title %}请求记录 - HTTP Mock Server{% endblock %}
{% block page_title %}请求记录{% endblock %}

{% block content %}
<div class="card mb-3">
    <div class="card-body">
        <div class="row g-2 align-items-end">
            <div class="col-md-3">
                <label class="form-label small">URL 搜索</label>
                <input type="text" class="form-control form-control-sm" id="filterUrl" placeholder="/api/users">
            </div>
            <div class="col-md-2">
                <label class="form-label small">HTTP 方法</label>
                <select class="form-select form-select-sm" id="filterMethod">
                    <option value="">全部</option>
                    <option value="GET">GET</option>
                    <option value="POST">POST</option>
                    <option value="PUT">PUT</option>
                    <option value="DELETE">DELETE</option>
                    <option value="PATCH">PATCH</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small">匹配结果</label>
                <select class="form-select form-select-sm" id="filterResult">
                    <option value="">全部</option>
                    <option value="matched">命中规则</option>
                    <option value="forwarded">已转发</option>
                    <option value="unmatched">未匹配</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small">开始时间</label>
                <input type="datetime-local" class="form-control form-control-sm" id="filterStart">
            </div>
            <div class="col-md-2">
                <label class="form-label small">结束时间</label>
                <input type="datetime-local" class="form-control form-control-sm" id="filterEnd">
            </div>
            <div class="col-md-1">
                <button class="btn btn-primary btn-sm w-100" onclick="loadRequests(1)"><i class="bi bi-search"></i></button>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead><tr>
                    <th width="150">时间</th>
                    <th>Request ID</th>
                    <th width="70">方法</th>
                    <th>URL</th>
                    <th width="90">匹配结果</th>
                    <th width="60">状态码</th>
                    <th width="60">耗时</th>
                    <th width="60">操作</th>
                </tr></thead>
                <tbody id="requestsTableBody">
                    <tr><td colspan="8" class="text-center text-muted py-4">加载中...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="d-flex justify-content-between align-items-center mt-3">
            <span class="text-muted small" id="pageInfo"></span>
            <div id="pagination"></div>
        </div>
    </div>
</div>

<!-- Request Detail Modal -->
<div class="modal fade" id="requestModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">请求详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="requestDetailBody">
                <p class="text-muted">加载中...</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/mock-admin/static/js/requests.js"></script>
{% endblock %}
